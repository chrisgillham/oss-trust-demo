name: OSS Trust Demo — CI

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "requirements.txt"
      - "pyproject.toml"

jobs:
  trust-check:
    name: Trust validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OSS Trust Framework
        run: pip install oss-trust-framework

      - name: Validate requests
        run: |
          oss-trust check \
            --package requests \
            --version 2.32.3 \
            --ecosystem PyPI \
            --github-repo psf/requests \
            --output json | tee trust-requests.json
          echo "Outcome: $(jq -r .outcome trust-requests.json)"

      - name: Validate rich
        run: |
          oss-trust check \
            --package rich \
            --version 13.9.4 \
            --ecosystem PyPI \
            --github-repo Textualize/rich \
            --output json | tee trust-rich.json
          echo "Outcome: $(jq -r .outcome trust-rich.json)"

      - name: Upload trust reports
        uses: actions/upload-artifact@v4
        with:
          name: trust-reports
          path: trust-*.json
          retention-days: 30

  run-tests:
    name: Run demo tests
    runs-on: ubuntu-latest
    needs: trust-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install oss-trust-framework
          pip install pytest pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v

  run-demo:
    name: Run all scenarios
    runs-on: ubuntu-latest
    needs: trust-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install oss-trust-framework rich click

      - name: Run demo — all scenarios
        run: python src/demo.py --scenario all
